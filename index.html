<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosilverv</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 550px;
            margin: 0 auto;
            padding: 40px 20px;
            color: #000;
            background: #fff;
            font-size: 14px;
            transition: background-color 0.3s, color 0.3s;
        }
        
        body.dark {
            background: #000;
            color: #fff;
        }
        
        h2 {
            font-size: 1.2em;
            margin-top: 2em;
            margin-bottom: 0.8em;
            font-weight: normal;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 2em 0;
        }
        
        td {
            padding: 4px 8px;
            border: 1px solid currentColor;
            vertical-align: top;
        }
        
        td:first-child {
            width: 120px;
        }
        
        a {
            color: inherit;
            text-decoration: underline;
        }
        
        a:hover {
            text-decoration: none;
        }
        
        p {
            margin: 0.3em 0;
        }
        
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: none;
            border: 1px solid currentColor;
            color: inherit;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
        }
        
        .theme-toggle:hover {
            opacity: 0.7;
        }
        
        .book-button {
            text-align: center;
            margin: 0.5em 0 2em;
            font-size: 48px;
            cursor: pointer;
        }
        
        .book-button:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td>Contact</td>
            <td><a href="https://twitter.com/nosilverv">@nosilverv</a></td>
        </tr>
        <tr>
            <td>Status</td>
            <td>2 slots open</td>
        </tr>
        <tr>
            <td>Updated</td>
            <td>November 2025</td>
        </tr>
    </table>

    <h2>Services</h2>
    
    <table>
        <tr>
            <td>Single Session</td>
            <td>60-minute call</td>
        </tr>
        <tr>
            <td>Monthly Retainer</td>
            <td>1-2 calls/month + async support. For 2-4 clients at a time.</td>
        </tr>
    </table>

    <h2>Select Clients</h2>
    
    <p>• Moritz Bierling</p>
    <p>• Michael Stroe</p>
    <p>• Chris Lakin</p>

    <h2>Get In Touch</h2>

    <div class="book-button">◉</div>

    <button class="theme-toggle" onclick="document.body.classList.toggle('dark')">◐</button>
</body>
</html>
