<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosilverv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --text: #1a1a1a;
      --muted: #666;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 18px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg);
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 48px;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a {
      color: var(--text);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
    }

    a:hover {
      color: var(--muted);
    }

    @media (max-width: 600px) {
      body {
        padding: 48px 20px 80px;
      }
    }
  </style>
</head>
<body>

  <h1>Nosilverv</h1>

  <nav>
    <a href="/consulting">Consulting</a>
    <a href="/recco">RECCO</a>
    <a href="https://x.com/nosilverv">Twitter</a>
    <a href="https://rivalvoices.substack.com/">Substack</a>
  </nav>

</body>
</html>
